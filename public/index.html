<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 监控看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background-color: #1e293b; color: white; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
        .label { color: #94a3b8; font-size: 0.875rem; }
        .value { font-size: 1.125rem; font-weight: 600; }
        .badge { background-color: #3b82f6; color: white; border-radius: 0.25rem; padding: 0.125rem 0.5rem; font-size: 0.75rem; margin: 0.125rem; display: inline-block; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">OpenClaw 监控看板 🍬 Thaumatin</h1>
            <div id="updateTime" class="text-slate-400 text-sm"></div>
        </div>
        
        <div id="loading" class="text-center text-xl mt-12">加载中...</div>
        
        <div id="content" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
            <!-- 1. 服务器统计 -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">服务器状态</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><p class="label">主机名</p><p id="hostname" class="value"></p></div>
                    <div><p class="label">操作系统</p><p id="platform" class="value"></p></div>
                    <div><p class="label">CPU 使用率</p><p id="cpu" class="value"></p></div>
                    <div><p class="label">内存使用率</p><p id="mem" class="value"></p></div>
                    <div><p class="label">内存占用</p><p id="memUsed" class="value"></p></div>
                    <div><p class="label">磁盘使用率</p><p id="disk" class="value"></p></div>
                </div>
            </div>

            <!-- 2. OpenClaw 技能 -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">OpenClaw 技能情况</h2>
                <div id="skillsList" class="max-h-60 overflow-y-auto"></div>
                <div class="mt-4 pt-2 border-t border-slate-700">
                    <p class="label">Token 使用量 (本会话)</p>
                    <p id="tokens" class="text-sm text-blue-400 mt-1">查看 session_status 获取实时数据</p>
                </div>
            </div>

            <!-- 3. 开发工具列表 -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">开发环境工具</h2>
                <div id="toolsList" class="space-y-2"></div>
            </div>

            <!-- 4. 环境信息 -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">环境配置</h2>
                <div class="space-y-3">
                    <div><p class="label">终端 Shell</p><p id="shell" class="text-sm font-mono"></p></div>
                    <div><p class="label">系统路径 (PATH)</p><p id="path" class="text-xs break-all font-mono opacity-80"></p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                document.getElementById('hostname').innerText = data.server.hostname;
                document.getElementById('platform').innerText = data.server.platform;
                document.getElementById('cpu').innerText = data.server.cpuUsage + '%';
                document.getElementById('mem').innerText = data.server.memUsage + '%';
                document.getElementById('memUsed').innerText = data.server.memUsed + ' / ' + data.server.memTotal;
                document.getElementById('disk').innerText = data.server.diskUsage + '%';

                const skillsDiv = document.getElementById('skillsList');
                skillsDiv.innerHTML = data.openclaw.skills.map(s => `<span class="badge">${s}</span>`).join('');

                const toolsDiv = document.getElementById('toolsList');
                toolsDiv.innerHTML = data.tools.map(t => `
                    <div class="flex justify-between border-b border-slate-800 py-1">
                        <span class="font-medium">${t.name}</span>
                        <span class="text-slate-400 text-sm font-mono">${t.version}</span>
                    </div>`).join('');

                document.getElementById('shell').innerText = data.env.SHELL || '未知';
                document.getElementById('path').innerText = data.env.PATH || '未知';

                document.getElementById('updateTime').innerText = '最后更新: ' + new Date().toLocaleTimeString();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').innerText = '获取数据失败: ' + err.message;
            }
        }
        fetchStats();
        setInterval(fetchStats, 5000); // 5秒刷新一次
    </script>
</body>
</html>
